<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900">
  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .entity { fill: #ffffff; stroke: #0f766e; stroke-width: 2; rx: 10; }
      .title { fill: #0f2f4a; font: 700 18px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .field { fill: #1f2937; font: 14px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .key { fill: #0f766e; font-weight: 700; }
      .rel { stroke: #64748b; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .rel-text { fill: #475569; font: 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
      .note { fill: #334155; font: 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="900"/>
  <text x="40" y="46" class="title" style="font-size:26px;">学籍管理系统概要设计 ER 图</text>
  <text x="40" y="76" class="note">核心围绕学生实体展开，专业、班级、课程、成绩、奖惩、学籍异动与附件均通过外键关联。</text>

  <g transform="translate(40,120)">
    <rect class="entity" width="230" height="130"/>
    <text class="title" x="18" y="30">专业 major</text>
    <text class="field key" x="18" y="60">PK id</text>
    <text class="field" x="18" y="84">name 专业名称</text>
    <text class="field" x="18" y="108">description 说明</text>
  </g>

  <g transform="translate(370,120)">
    <rect class="entity" width="240" height="150"/>
    <text class="title" x="18" y="30">班级 class</text>
    <text class="field key" x="18" y="60">PK id</text>
    <text class="field" x="18" y="84">name 班级名称</text>
    <text class="field" x="18" y="108">grade_year 年级</text>
    <text class="field" x="18" y="132">FK major_id 专业</text>
  </g>

  <g transform="translate(720,95)">
    <rect class="entity" width="280" height="210"/>
    <text class="title" x="18" y="30">学生 student</text>
    <text class="field key" x="18" y="58">PK id</text>
    <text class="field" x="18" y="82">student_no 学号</text>
    <text class="field" x="18" y="106">name 姓名 / gender 性别</text>
    <text class="field" x="18" y="130">phone 电话 / email 邮箱</text>
    <text class="field" x="18" y="154">enrollment_year 入学年份</text>
    <text class="field" x="18" y="178">status 学籍状态</text>
    <text class="field" x="18" y="202">FK major_id / class_id</text>
  </g>

  <g transform="translate(1040,120)">
    <rect class="entity" width="200" height="120"/>
    <text class="title" x="18" y="30">管理员 admin_user</text>
    <text class="field key" x="18" y="60">PK id</text>
    <text class="field" x="18" y="84">username 账号</text>
    <text class="field" x="18" y="108">full_name 姓名</text>
  </g>

  <g transform="translate(40,385)">
    <rect class="entity" width="240" height="150"/>
    <text class="title" x="18" y="30">课程 course</text>
    <text class="field key" x="18" y="60">PK id</text>
    <text class="field" x="18" y="84">course_code 课程号</text>
    <text class="field" x="18" y="108">name 课程名</text>
    <text class="field" x="18" y="132">credit / hours / semester</text>
  </g>

  <g transform="translate(390,370)">
    <rect class="entity" width="260" height="165"/>
    <text class="title" x="18" y="30">选课 course_selection</text>
    <text class="field key" x="18" y="60">PK id</text>
    <text class="field" x="18" y="84">FK student_id 学生</text>
    <text class="field" x="18" y="108">FK course_id 课程</text>
    <text class="field" x="18" y="132">selection_date 选课日期</text>
    <text class="field" x="18" y="156">唯一约束: student + course</text>
  </g>

  <g transform="translate(730,385)">
    <rect class="entity" width="250" height="150"/>
    <text class="title" x="18" y="30">成绩 score</text>
    <text class="field key" x="18" y="60">PK id</text>
    <text class="field" x="18" y="84">FK selection_id 选课</text>
    <text class="field" x="18" y="108">usual_score / final_score</text>
    <text class="field" x="18" y="132">total_score / grade_level</text>
  </g>

  <g transform="translate(40,650)">
    <rect class="entity" width="260" height="150"/>
    <text class="title" x="18" y="30">奖惩 reward_punishment</text>
    <text class="field key" x="18" y="60">PK id</text>
    <text class="field" x="18" y="84">FK student_id 学生</text>
    <text class="field" x="18" y="108">record_type 类型</text>
    <text class="field" x="18" y="132">title / description / date</text>
  </g>

  <g transform="translate(385,650)">
    <rect class="entity" width="285" height="165"/>
    <text class="title" x="18" y="30">学籍异动 status_change</text>
    <text class="field key" x="18" y="60">PK id</text>
    <text class="field" x="18" y="84">FK student_id 学生</text>
    <text class="field" x="18" y="108">change_type 异动类型</text>
    <text class="field" x="18" y="132">old_value / new_value</text>
    <text class="field" x="18" y="156">reason / change_date</text>
  </g>

  <g transform="translate(755,650)">
    <rect class="entity" width="285" height="165"/>
    <text class="title" x="18" y="30">附件 student_attachment</text>
    <text class="field key" x="18" y="60">PK id</text>
    <text class="field" x="18" y="84">FK student_id 学生</text>
    <text class="field" x="18" y="108">file_name / file_type</text>
    <text class="field" x="18" y="132">file_path 文件路径</text>
    <text class="field" x="18" y="156">description / uploaded_at</text>
  </g>

  <path class="rel" d="M270 185 C315 185 330 195 370 195"/>
  <text class="rel-text" x="292" y="176">1 : N</text>

  <path class="rel" d="M610 195 C660 195 675 200 720 200"/>
  <text class="rel-text" x="648" y="188">班级-学生 1:N</text>

  <path class="rel" d="M270 235 C480 305 560 210 720 170"/>
  <text class="rel-text" x="420" y="285">专业-学生 1:N</text>

  <path class="rel" d="M720 255 C620 300 575 330 520 370"/>
  <text class="rel-text" x="585" y="320">学生选课 1:N</text>

  <path class="rel" d="M280 455 C325 455 345 455 390 455"/>
  <text class="rel-text" x="315" y="442">课程 1:N</text>

  <path class="rel" d="M650 455 C685 455 700 455 730 455"/>
  <text class="rel-text" x="670" y="442">1 : 1</text>

  <path class="rel" d="M720 285 C505 520 290 585 180 650"/>
  <text class="rel-text" x="315" y="610">学生-奖惩 1:N</text>

  <path class="rel" d="M805 305 C710 485 610 575 525 650"/>
  <text class="rel-text" x="620" y="600">学生-异动 1:N</text>

  <path class="rel" d="M900 305 C900 445 900 555 900 650"/>
  <text class="rel-text" x="915" y="575">学生-附件 1:N</text>

  <text x="1040" y="282" class="note">管理员为登录/维护实体，</text>
  <text x="1040" y="306" class="note">不参与学生业务主链路。</text>
</svg>
